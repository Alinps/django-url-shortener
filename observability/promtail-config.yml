server:
  http_listen_port: 9080

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:

  - job_name: django_logs
    static_configs:
      - targets:
          - localhost
        labels:
          job: django
          service: django
          __path__: /app-logs/*.log

    pipeline_stages:
      - json:
          expressions:
            level: level
            request_id: request_id
            message: message
      - labels:
          level:
          request_id:
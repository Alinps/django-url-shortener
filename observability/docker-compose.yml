services:
  tempo:
    image: grafana/tempo:2.5.0
    container_name: tempo
    command: [ "--target=all", "--config.file=/etc/tempo.yaml" ]
    volumes:
      - ./tempo.yaml:/etc/tempo.yaml
    ports:
      - "4317:4317"
      - "3200:3200"
    networks:
      - observability

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - observability
    environment:
      - GF_SMTP_ENABLED=true
      - GF_SMTP_HOST=smtp.gmail.com:587
      - GF_SMTP_USER=alinps8547@gmail.com
      - GF_SMTP_PASSWORD=oylmnlbpqzipqylo
      - GF_SMTP_FROM_ADDRESS=alinps8547@gmail.com
      - GF_SMTP_FROM_NAME=Grafana Alerts
      - GF_SMTP_SKIP_VERIFY=false
  loki:
    image: grafana/loki:2.9.3
    container_name: loki
    ports:
      - "3100:3100"
    volumes:
      - ./loki-config.yml:/etc/loki/local-config.yaml
      - loki-data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - observability

  promtail:
    image: grafana/promtail:2.9.3
    container_name: promtail
    volumes:
      - /home/alin-p-s/Django_project/url_shortner/urlshortner/logs:/app-logs
      - ./promtail-config.yml:/etc/promtail/config.yml
      - promtail-data:/tmp
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki
    networks:
      - observability



volumes:
  grafana_data:
  loki-data:
  promtail-data:
networks:
  observability: